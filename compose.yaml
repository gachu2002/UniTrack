services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: unitrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d unitrack"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - unitrack-postgres:/var/lib/postgresql/data

volumes:
  unitrack-postgres:
